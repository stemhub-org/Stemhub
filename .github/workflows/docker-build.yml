name: app-ci

on:
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.yml"
      - ".github/workflows/docker-build.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker-compose.yml"
      - ".github/workflows/docker-build.yml"
  workflow_dispatch:

jobs:
  backend-tests:
    name: backend-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/pyproject.toml
            backend/vendor/PyFLP_enhanced/pyproject.toml

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e backend/vendor/PyFLP_enhanced
          pip install -e "backend[dev]"

      - name: Run backend tests
        run: pytest backend/tests

  frontend-lint:
    name: frontend-lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Run frontend lint
        run: npm run lint --prefix frontend

  compose-integration:
    name: compose-integration
    runs-on: ubuntu-latest
    env:
      POSTGRES_USER: ci
      POSTGRES_PASSWORD: ci
      POSTGRES_DB: ci
      DATABASE_URL: postgresql://ci:ci@db:5432/ci
      SECRET_KEY: ci
      GOOGLE_CLIENT_ID: ci
      GOOGLE_CLIENT_SECRET: ci
      STEMHUB_STORAGE_PROVIDER: local
      STEMHUB_ARTIFACTS_ROOT: /tmp/artifacts
      STEMHUB_GCS_BUCKET: ci
      STEMHUB_GCS_PROJECT: ci
      STEMHUB_GCS_CREDENTIALS_JSON: "{}"
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/fake-gcp.json
      NEXT_PUBLIC_API_URL: http://backend:8000
      PGADMIN_DEFAULT_EMAIL: ci@example.com
      PGADMIN_DEFAULT_PASSWORD: ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Docker Compose is available
        run: docker compose version

      - name: Build backend and frontend services
        run: docker compose build backend frontend

      - name: Start database
        run: docker compose up -d db

      - name: Wait for database readiness
        run: |
          timeout 120s bash -c 'until docker compose exec -T db pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do sleep 2; done'

      - name: Validate Alembic migrations
        run: docker compose run --rm backend alembic upgrade head

      - name: Start backend and frontend
        run: docker compose up -d --no-build backend frontend

      - name: Smoke test backend root endpoint
        run: |
          timeout 120s bash -c 'until curl -fsS http://127.0.0.1:8000/ | grep -q "Welcome to the StemHub API"; do sleep 2; done'

      - name: Smoke test frontend root endpoint
        run: |
          timeout 180s bash -c 'until curl -fsS http://127.0.0.1:3000/ | grep -qi "<html"; do sleep 2; done'

      - name: Show Docker Compose logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down Docker Compose stack
        if: always()
        run: docker compose down -v --remove-orphans
